name: signease_app
description: iSigner — Mobile Document Signing App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Fonts
  google_fonts: ^6.2.1

  # File picking
  file_picker: ^8.1.2

  # PDF rendering
  pdfx: ^2.6.0

  # File system
  path_provider: ^2.1.3

  # Sharing
  share_plus: ^10.0.2

  # PDF generation / printing
  pdf: ^3.10.8
  printing: ^5.13.1

  # Image processing
  image: ^4.2.0

  # Backend / Auth
  http: ^1.2.2
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/isigner_logo.png
    - assets/images/isigner_icon.png
